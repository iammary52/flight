<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky Drift: Afterburn</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <canvas id="scene"></canvas>

  <div class="hud">
    <div class="topbar">
      <div>
        <p class="eyebrow">Sky Drift</p>
        <h1>Afterburn</h1>
      </div>
      <div class="meters">
        <span id="scoreLabel">Score 0</span>
        <span id="speedLabel">Speed 0</span>
        <span id="altitudeLabel">Altitude 0</span>
        <span id="shieldLabel">Shield 100</span>
        <span id="musicLabel">Music standby</span>
      </div>
    </div>

    <div class="reticle" aria-hidden="true">
      <span></span>
      <i></i>
    </div>

    <div class="mission-strip">
      <span>Fly</span>
      <span>Chase drones</span>
      <span>Fire with Z</span>
      <span>Boost with Space</span>
    </div>
  </div>

  <div class="overlay" id="startOverlay">
    <div class="overlay-card">
      <p class="eyebrow">Arcade Flight Upgrade</p>
      <h2>Ready for takeoff</h2>
      <p>Behind-the-plane camera, enemy drones, laser fire, pickups, and faster procedural music are now online.</p>
      <button id="startButton">Start Flight</button>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
